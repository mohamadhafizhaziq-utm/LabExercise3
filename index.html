<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherNow - Real-Time Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>WeatherNow Dashboard</h1>
        
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Search city (e.g., Tokyo)...">
            <button id="searchBtn">Search</button>
        </div>
        <p id="validationMsg" class="error-text" style="display:none;">⚠️ Please enter at least 2 characters[cite: 58].</p>

        <div id="currentWeather" class="card">
            <div class="weather-header">
                <h2 id="cityName" class="skeleton-text">City Name</h2>
                <div id="localTime" class="skeleton-text" style="font-weight: bold;">--:--</div>
            </div>
            <hr style="opacity: 0.1; margin: 15px 0;">
            <div class="weather-info">
                <div id="temp" class="temp skeleton-text">--°C</div>
                <div class="details">
                    <div id="description" class="skeleton-text" style="font-size: 1.2rem; margin-bottom: 10px;">Condition</div>
                    <p>💧 Humidity: <span id="humidity" class="skeleton-text">--%</span></p>
                    <p>🌬️ Wind: <span id="wind" class="skeleton-text">-- km/h</span></p>
                </div>
            </div>
        </div>

        <h3 style="margin-bottom: 15px;">7-Day Forecast</h3>
        <div id="forecastRow" class="forecast-row">
            </div>

        <div id="errorBanner" class="error-banner">
            <p id="errorMsg"></p>
            <button onclick="location.reload()">Retry</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
